# =============================================================================
# Google Cloud Build — Artifact Registry へプッシュ → Cloud Run デプロイ
# =============================================================================
#
# 事前準備:
#   - Artifact Registry にリポジトリを作成（例: race-data-repo、形式 docker）
#   - Cloud Run API / Artifact Registry API を有効化
#   - Cloud Build のサービスアカウントに roles/run.admin, roles/artifactregistry.writer 等を付与
#   - GitHub 連携トリガーでは $COMMIT_SHA / $SHORT_SHA が利用可能
#
# 手動実行で COMMIT_SHA が空の場合は、トリガーで「置換変数」に COMMIT_SHA を渡すか、
# 下記 substitutions の _IMAGE_TAG を BUILD_ID 等に変更してください。
#
# Cloud Run 側で必須:
#   - シークレットまたは環境変数で DATABASE_URL（Cloud SQL 等）
#   - Cloud SQL 利用時はデプロイに --add-cloudsql-instances=PROJECT:REGION:INSTANCE を追加
#
# フロント（Nginx）は別ホスティング想定。このパイプラインは API のみをデプロイします。
# =============================================================================

substitutions:
  _REGION: asia-northeast1
  _AR_REPOSITORY: race-data-repo
  _IMAGE_NAME: app-image
  _SERVICE_NAME: race-data-service

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # 1. Docker イメージのビルド（Cloud Run 向け Dockerfile）
  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - docker/Dockerfile.cloudrun
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:latest
      - .

  # 2. Artifact Registry へプッシュ（コミット SHA タグ）
  - id: push-commit
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
    waitFor:
      - build-image

  # 3. latest タグのプッシュ
  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:latest
    waitFor:
      - build-image

  # 4. Cloud Run へデプロイ
  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --port
      - "8080"
      - --allow-unauthenticated
      - --quiet
    waitFor:
      - push-commit
