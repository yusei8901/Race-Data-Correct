# =============================================================================
# Google Cloud Build — Artifact Registry へプッシュ → Cloud Run デプロイ
# =============================================================================
#
# Terraform（horse-infrastructure）と揃えた既定値:
#   - Artifact Registry: shared/modules/delivery の horse-${env}-app-repo
#   - Cloud Run: shared/modules/compute の horse-${env}-${region_short}-run-app
#   - region_short（asia-northeast1）= an1
#
# 開発（env=dev）の例:
#   リポジトリ ID: horse-dev-app-repo
#   イメージ URL:  asia-northeast1-docker.pkg.dev/$PROJECT_ID/horse-dev-app-repo/${_IMAGE_NAME}:$COMMIT_SHA
#   Cloud Run 名:  horse-dev-an1-run-app
#
# 本番など別環境では Cloud Build トリガーの「置換変数」で _AR_REPOSITORY / _SERVICE_NAME を上書きしてください。
# 例（prd）: horse-prd-app-repo, horse-prd-an1-run-app
#
# 前提:
#   - Artifact Registry は Terraform で作成済み（コンソールの手動作成でも同じ repository_id に合わせる）
#   - Cloud Build SA に artifactregistry.writer / run.admin 等
#   - GitHub トリガーで $COMMIT_SHA が入ること
#
# Terraform の Cloud Run は IAP 有効のため、公開匿名アクセス (--allow-unauthenticated) は付けていません。
# Cloud SQL 接続や DATABASE_URL は Cloud Run コンソール / Secret Manager で設定してください。
# （注: 現行 Terraform は MySQL、本アプリ FastAPI は PostgreSQL 前提のため、DB 接続方式は別途整合が必要です。）
#
# イメージは docker/Dockerfile.fullstack（Nginx + 静的フロント + FastAPI 同一コンテナ）。
# =============================================================================

substitutions:
  _REGION: asia-northeast1
  # Terraform: google_artifact_registry_repository.app_repo.repository_id（dev）
  _AR_REPOSITORY: horse-dev-app-repo
  _IMAGE_NAME: app-image
  # Terraform: google_cloud_run_v2_service.app.name（dev）
  _SERVICE_NAME: horse-dev-an1-run-app

# フルスタックイメージは pnpm ビルドを含むため、デフォルトより長めにする
timeout: 1800s

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # 1. Docker イメージのビルド（フルスタック: Nginx + フロント静的 + FastAPI）
  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - docker/Dockerfile.fullstack
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:latest
      - .

  # 2. Artifact Registry へプッシュ（コミット SHA タグ）
  - id: push-commit
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
    waitFor:
      - build-image

  # 3. latest タグのプッシュ
  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:latest
    waitFor:
      - build-image

  # 4. Cloud Run へデプロイ（Terraform で作成済みサービスへ新イメージを反映）
  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --port
      - "8080"
      - --no-allow-unauthenticated
      - --quiet
    waitFor:
      - push-commit
